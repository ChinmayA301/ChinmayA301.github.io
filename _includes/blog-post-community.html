<section id="comments" class="blog-community" aria-labelledby="blog-community-heading">
  <header class="blog-community-header">
    <p class="blog-community-kicker">After the last line</p>
    <h2 id="blog-community-heading">Comments &amp; sharing</h2>
    <p>Agree, disagree, add context, or send this to someone who would have a take.</p>
  </header>

  <div class="blog-share-panel" aria-label="Share this post">
    <p>Share</p>
    <div class="blog-share-actions">
      <button type="button" data-share-native data-share-title="{{ page.title | escape }}"
        data-share-url="{{ page.url | absolute_url }}">Share…</button>
      <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ page.url | absolute_url | url_encode }}"
        target="_blank" rel="noopener noreferrer">LinkedIn</a>
      <a href="https://twitter.com/intent/tweet?text={{ page.title | url_encode }}&amp;url={{ page.url | absolute_url | url_encode }}"
        target="_blank" rel="noopener noreferrer">X</a>
      <a href="mailto:?subject={{ page.title | url_encode }}&amp;body={{ page.url | absolute_url | url_encode }}">Email</a>
      <button type="button" data-share-copy data-share-url="{{ page.url | absolute_url }}">Copy link</button>
    </div>
    <p class="blog-share-status" role="status" aria-live="polite"></p>
  </div>

  <form class="blog-comment-form" action="https://formspree.io/f/xrbyalqp" method="POST"
    data-blog-form data-success-message="Comment received. Thanks for adding to the thought.">
    <input type="hidden" name="_subject" value="Brain Vomit comment: {{ page.title | escape }}">
    <input type="hidden" name="post_title" value="{{ page.title | escape }}">
    <input type="hidden" name="post_url" value="{{ page.url | absolute_url }}">
    <div class="blog-comment-fields">
      <label>
        <span>Name</span>
        <input type="text" name="name" autocomplete="name" placeholder="Your name" required>
      </label>
      <label>
        <span>Email <small>not published</small></span>
        <input type="email" name="email" autocomplete="email" placeholder="you@example.com" required>
      </label>
    </div>
    <label>
      <span>Comment</span>
      <textarea name="message" rows="5" placeholder="Leave a thought, correction, question, or useful tangent." required></textarea>
    </label>
    <div class="blog-comment-submit">
      <button type="submit">Send comment</button>
      <p>Comments arrive directly to me; public threading is not live yet.</p>
    </div>
    <p class="blog-form-status" role="status" aria-live="polite"></p>
  </form>
</section>
