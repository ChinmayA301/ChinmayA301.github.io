<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": {{ page.schema_type | default: "TechArticle" | jsonify }},
  "headline": {{ page.title | jsonify }},
  "description": {{ include.description | jsonify }},
  "url": {{ include.canonical | jsonify }},
  "mainEntityOfPage": {{ include.canonical | jsonify }},
  "image": {{ include.image | jsonify }},
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  "dateModified": "{{ include.modified | date_to_xmlschema }}",
  "inLanguage": "{{ page.lang | default: site.lang | default: 'en-US' | replace: '_', '-' }}",
  {% if page.keywords %}
  "keywords": {{ page.keywords | jsonify }},
  {% elsif page.tags %}
  "keywords": {{ page.tags | jsonify }},
  {% endif %}
  "wordCount": {{ page.content | strip_html | number_of_words }},
  "author": {
    "@type": "Person",
    "@id": "https://app.chinmayarora.com/#person",
    "name": "Chinmay Arora",
    "url": "https://app.chinmayarora.com/"
  },
  "publisher": {
    "@type": "Person",
    "@id": "https://app.chinmayarora.com/#person",
    "name": "Chinmay Arora"
  },
  "isPartOf": {
    "@type": "Blog",
    "@id": "https://app.chinmayarora.com/blog/#blog"
  }{% if page.categories %},
  "articleSection": {{ page.categories | jsonify }}{% endif %}{% if page.content_type %},
  "genre": {{ page.content_label | default: page.content_type | jsonify }}{% endif %}
}
</script>
