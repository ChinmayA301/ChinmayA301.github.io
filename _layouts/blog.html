<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .section {
      opacity: 1 !important;
      transform: none !important;
    }
    .stagger-item {
      opacity: 1 !important;
      transform: none !important;
    }
  </style>
  {% seo %}
</head>
<body class="blog-theme">
  <div class="bg-orb orb-1" aria-hidden="true"></div>
  <div class="bg-orb orb-2" aria-hidden="true"></div>
  <div class="bg-orb orb-3" aria-hidden="true"></div>

  <header class="section pb-0">
    <div class="container">
      <div class="d-flex align-items-center justify-content-between gap-3 mb-3">
        <a class="navbar-brand fw-bold" href="{{ '/' | relative_url }}">CA</a>
        <button id="themeToggle" class="blog-theme-toggle" type="button" aria-label="Switch to light mode">Light Mode</button>
      </div>
      <nav class="blog-top-nav mb-4" aria-label="Site navigation">
        <a class="blog-top-link nav-link-blog active" aria-current="page" href="{{ '/blog/' | relative_url }}">Blog</a>
        <a class="blog-top-link" href="{{ '/experience/' | relative_url }}">Experience</a>
        <a class="blog-top-link" href="{{ '/projects/' | relative_url }}">Projects</a>
        <a class="blog-top-link" href="{{ '/ideas/' | relative_url }}">The Lab</a>
        <a class="blog-top-link" href="{{ '/coursework/' | relative_url }}">Coursework</a>
        <a class="blog-top-link" href="{{ '/reports/' | relative_url }}">Reports</a>
      </nav>
      <h1 class="section-title">{{ page.title }}</h1>
      {% if page.description %}
      <p class="section-text">{{ page.description }}</p>
      {% endif %}
    </div>
  </header>

  <main id="main-content" class="section pt-4" role="main">
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer class="bg-dark text-white py-3 border-top">
    <div class="container text-center small">
      <p class="mb-0">&copy; <span id="year"></span> Chinmay Arora. All Rights Reserved.</p>
      <p class="mb-0 mt-1">
        <a href="{{ '/blog/' | relative_url }}">Blog</a> |
        <a href="{{ '/projects/' | relative_url }}">Projects</a> |
        <span class="blog-footer-muted" aria-label="llms.txt reference">llms.txt</span>
      </p>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const themeKey = 'blog-theme';
    const root = document.documentElement;
    const body = document.body;
    const toggle = document.getElementById('themeToggle');

    const setTheme = (theme) => {
      const isLight = theme === 'light';
      root.classList.toggle('theme-light', isLight);
      root.setAttribute('data-theme', isLight ? 'light' : 'dark');
      body.classList.toggle('theme-light', isLight);
      toggle.textContent = isLight ? 'Dark Mode' : 'Light Mode';
      toggle.setAttribute('aria-label', isLight ? 'Switch to dark mode' : 'Switch to light mode');
    };

    const savedTheme = localStorage.getItem(themeKey);
    setTheme(savedTheme === 'light' ? 'light' : 'dark');

    toggle.addEventListener('click', () => {
      const nextTheme = body.classList.contains('theme-light') ? 'dark' : 'light';
      localStorage.setItem(themeKey, nextTheme);
      setTheme(nextTheme);
    });
  </script>
</body>
</html>
