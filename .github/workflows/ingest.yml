name: Aegis RAG Ingestion

on:
  push:
    branches:
      - main
    paths:
      - '_posts/**'
      - 'index.html'
      - 'experience/**'
      - 'projects/**'
      - 'reports/**'
      - 'resumes/**'
      - 'coursework/**'
      - 'ideas/**'
      - 'blog/**'
      - 'data/lab_ideas.json'
      - 'data/*.json'
      - 'aegis-backend/ingest.py'
      - 'aegis-backend/requirements-ingest.txt'
      - 'aegis-backend/pyproject.toml'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aegis-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ingest.txt

      - name: Run Ingestion Script
        env:
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_HOST: ${{ secrets.PINECONE_HOST }}
          PINECONE_INDEX: ${{ secrets.PINECONE_INDEX }}
          PINECONE_NAMESPACE: ${{ secrets.PINECONE_NAMESPACE }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_EMBED_MODEL: models/gemini-embedding-001
          DATA_DIR: ../data
        run: python ingest.py
